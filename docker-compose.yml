services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sliceops
      POSTGRES_PASSWORD: sliceops
      POSTGRES_DB: sliceops
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sliceops"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - SLICEOPS_REDIS_URL=redis://redis:6379/0
      - SLICEOPS_TEMP_DIR=/tmp/sliceops
      - SLICEOPS_PRUSA_SLICER_PATH=prusa-slicer
      - SLICEOPS_BAMBU_STUDIO_PATH=bambu-studio
      - SLICEOPS_DATABASE_URL=postgresql+asyncpg://sliceops:sliceops@postgres:5432/sliceops
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    tmpfs:
      - /tmp/sliceops:size=512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build: .
    restart: unless-stopped
    command: uv run celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - SLICEOPS_REDIS_URL=redis://redis:6379/0
      - SLICEOPS_TEMP_DIR=/tmp/sliceops
      - SLICEOPS_PRUSA_SLICER_PATH=prusa-slicer
      - SLICEOPS_BAMBU_STUDIO_PATH=bambu-studio
      - SLICEOPS_DATABASE_URL=postgresql+asyncpg://sliceops:sliceops@postgres:5432/sliceops
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    tmpfs:
      - /tmp/sliceops:size=512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  beat:
    build: .
    restart: unless-stopped
    command: uv run celery -A app.worker.celery_app beat --loglevel=info
    environment:
      - SLICEOPS_REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
  postgres-data:
